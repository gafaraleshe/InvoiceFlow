version: "3.9"

services:
  # ─── PostgreSQL Database ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: invoiceflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: invoiceflow
      POSTGRES_PASSWORD: invoiceflow_secret
      POSTGRES_DB: invoiceflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoiceflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── InvoiceFlow API ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoiceflow-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://invoiceflow:invoiceflow_secret@db:3306/invoiceflow
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-InvoiceFlow <invoices@resend.dev>}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/trpc/auth.me"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  postgres_data:
    driver: local
